{# 管理员令牌卡片 #}
<section class="admin-card rounded-2xl border border-white/[0.08] bg-slate-900/40 p-5 shadow-xl shadow-black/20 backdrop-blur-sm">
  <div class="flex flex-wrap items-center gap-2">
    <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">访问控制</span>
    <span id="admin-login-badge" class="hidden rounded-full bg-emerald-500/15 px-2.5 py-0.5 text-xs font-medium text-emerald-300">本地令牌已保存</span>
  </div>
  <p class="mt-1 text-sm text-slate-400">
    管理令牌须与服务器 <code class="rounded bg-slate-800 px-1 font-mono text-xs">ADMIN_TOKEN</code> 完全一致（逐字符）。
    若刷新列表出现 <strong class="font-medium text-amber-200/90">403</strong>，表示<strong class="text-slate-200">服务器</strong>未在运行环境的 <code class="rounded bg-slate-800 px-1 font-mono text-[11px]">.env</code> 中配置该项或未重启 Flask，与浏览器是否保存令牌无关。
  </p>
  <input type="password" id="admin-token" class="mt-3 w-full max-w-md rounded-xl border border-white/10 bg-slate-950/60 px-3 py-2.5 font-mono text-sm text-white outline-none ring-0 transition focus:border-indigo-400/40 focus:ring-2 focus:ring-indigo-500/20" placeholder="输入令牌后保存" autocomplete="off" />
  <div class="mt-3 flex flex-wrap items-center gap-2">
    <button type="button" id="save-token" class="rounded-xl bg-indigo-500 px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-indigo-500/20 transition hover:bg-indigo-400">保存令牌</button>
    <button type="button" id="clear-admin-token" class="rounded-xl border border-white/10 bg-white/[0.04] px-4 py-2 text-sm text-slate-300 transition hover:bg-white/[0.08]">清除本地</button>
  </div>
  <p class="mt-2 text-xs text-slate-500">令牌保存在本机 <code class="rounded bg-slate-800/80 px-1">localStorage</code>，仅用于订单接口。</p>
</section>
