<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 24px auto; line-height: 1.5; }
    .card { border: 1px solid #ddd; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
    .link-box { background: #f7f7f7; padding: 12px; border-radius: 6px; word-break: break-all; }
    button { padding: 8px 12px; cursor: pointer; margin-right: 8px; }
  </style>
</head>
<body>
  <h2>VPN User Dashboard</h2>
  <div class="card">
    <div><b>Username:</b> <span id="username">-</span></div>
    <div><b>Email:</b> <span id="email">-</span></div>
    <div><b>UUID:</b> <span id="uuid">-</span></div>
    <div style="margin-top: 10px;">
      <b>当前同时在线 IP 数: </b>
      <span id="online-ip-count">-</span>
      <div id="online-ip-hint" style="font-size: 12px; color: #666; margin-top: 4px;"></div>
    </div>
    <div style="margin-top: 10px;">
      <b>Node:</b>
      <select id="node-select"></select>
      <button onclick="switchNode()">Switch Node</button>
    </div>
  </div>

  <div class="card">
    <h3>Your Subscription / VLESS Link</h3>
    <div id="vless-link" class="link-box">Loading...</div>
    <div style="margin-top: 10px;">
      <button onclick="copyLink()">Copy Link</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");
    let isLoadingUsage = false;
    if (!token) {
      window.location.href = "/";
    }

    async function loadProfile() {
      const resp = await fetch("/api/auth/me", {
        headers: { "Authorization": "Bearer " + token }
      });

      if (!resp.ok) {
        localStorage.removeItem("token");
        window.location.href = "/";
        return;
      }

      const data = await resp.json();
      const user = data.data.user;
      document.getElementById("username").textContent = user.username;
      document.getElementById("email").textContent = user.email;
      document.getElementById("uuid").textContent = user.uuid;
      document.getElementById("vless-link").textContent = user.vless_link || "x-ui did not return link yet";
      await loadNodes(user.current_node_id);
      await loadUsage();
    }

    async function loadUsage() {
      if (isLoadingUsage) return;
      isLoadingUsage = true;
      try {
        const resp = await fetch("/api/auth/usage", {
          cache: "no-store",
          headers: {
            "Authorization": "Bearer " + token,
            "Cache-Control": "no-cache"
          }
        });
        const data = await resp.json().catch(() => null);
        const hintEl = document.getElementById("online-ip-hint");
        if (!resp.ok || !data || !data.data) {
          document.getElementById("online-ip-count").textContent = "未知";
          if (hintEl) hintEl.textContent = "";
          return;
        }
        const online = data.data.online_ip_count;
        const limit = data.data.limit_ip;
        const suffix = data.data.fallback_used ? "（估算）" : "";
        document.getElementById("online-ip-count").textContent = `${online}/${limit}${suffix}`;
        if (hintEl) {
          const ev = data.data.events_in_window ?? 0;
          const dist = data.data.distinct_ips_any ?? 0;
          const minEv = data.data.min_events_per_ip ?? 2;
          if (!data.data.fallback_used) {
            if (online === 0 && ev === 0) {
              hintEl.textContent =
                "窗口内无上报事件：请确认节点上 shipper 在跑、access.log 有新行；新版已支持「时间戳 源IP:端口 accepted」类日志（不要求含 from）。";
            } else if (online === 0 && dist > 0) {
              hintEl.textContent =
                "已有 " +
                ev +
                " 条事件、" +
                dist +
                " 个来源 IP，但未达到每 IP 至少 " +
                minEv +
                " 条；可在 .env 调低 ONLINE_MIN_EVENTS_PER_IP 或增大 ONLINE_STATS_WINDOW_SEC。";
            } else {
              hintEl.textContent = "";
            }
          } else {
            hintEl.textContent = "";
          }
        }
      } catch (e) {
        document.getElementById("online-ip-count").textContent = "未知";
        const h = document.getElementById("online-ip-hint");
        if (h) h.textContent = "";
      } finally {
        isLoadingUsage = false;
      }
    }

    async function loadNodes(currentNodeId) {
      const resp = await fetch("/api/nodes", {
        headers: { "Authorization": "Bearer " + token }
      });
      if (!resp.ok) return;

      const data = await resp.json();
      const nodes = (data.data && data.data.nodes) || [];
      const select = document.getElementById("node-select");
      select.innerHTML = "";
      nodes.forEach((n) => {
        const option = document.createElement("option");
        option.value = n.id;
        option.textContent = `${n.name} (${n.region})`;
        if (n.id === currentNodeId) option.selected = true;
        select.appendChild(option);
      });
    }

    async function switchNode() {
      const nodeId = Number(document.getElementById("node-select").value);
      if (!nodeId) return;
      const resp = await fetch("/api/nodes/select", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ node_id: nodeId })
      });
      const data = await resp.json();
      if (!resp.ok) {
        alert(data.message || "switch failed");
        return;
      }
      document.getElementById("uuid").textContent = data.data.uuid;
      document.getElementById("vless-link").textContent = data.data.vless_link || "x-ui did not return link yet";
      alert("Node switched.");
      await loadUsage();
    }

    async function copyLink() {
      const text = document.getElementById("vless-link").textContent;
      await navigator.clipboard.writeText(text);
      alert("Link copied.");
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "/";
    }

    loadProfile();
    setInterval(loadUsage, 3000);
  </script>
</body>
</html>
