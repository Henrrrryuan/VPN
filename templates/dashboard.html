{% from '_site_urls.html' import site_url %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="api-base" content="{{ request.script_root or '' }}" />
  <title>控制台 - VPN SaaS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="theme-color" content="#6366f1" />
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="pointer-events-none fixed inset-0 -z-10">
    <div class="absolute -top-40 left-1/2 h-[520px] w-[920px] -translate-x-1/2 rounded-full bg-indigo-500/20 blur-3xl"></div>
    <div class="absolute top-80 left-1/3 h-[420px] w-[680px] -translate-x-1/2 rounded-full bg-fuchsia-500/15 blur-3xl"></div>
  </div>

  <header class="sticky top-0 z-50 border-b border-white/10 bg-slate-950/70 backdrop-blur">
    <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-3">
      <a href="{{ site_url('index') }}" class="flex items-center gap-3">
        <div class="h-10 w-10 rounded-xl bg-gradient-to-br from-indigo-500 to-fuchsia-500 p-[1px]">
          <div class="flex h-full w-full items-center justify-center rounded-[14px] bg-slate-950 text-sm font-bold">V</div>
        </div>
        <span class="text-sm font-semibold text-white">控制台</span>
      </a>
      <div class="flex items-center gap-2">
        <a href="{{ site_url('index') }}#pricing" class="rounded-xl border border-white/15 bg-white/5 px-3 py-2 text-xs text-slate-200 hover:bg-white/10 sm:text-sm">套餐</a>
        <button type="button" onclick="logout()" class="rounded-xl bg-white/10 px-3 py-2 text-xs font-medium text-slate-200 hover:bg-white/15 sm:text-sm">退出</button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl space-y-6 px-4 py-8">
    <div id="banner" class="hidden rounded-2xl border px-4 py-3 text-sm"></div>

    <section class="rounded-[1.5rem] border border-white/10 bg-white/5 p-5 sm:p-6">
      <h2 class="text-lg font-bold text-white">账号</h2>
      <div class="mt-4 grid gap-3 text-sm sm:grid-cols-2">
        <div><span class="text-slate-400">用户名</span> <span id="username" class="ml-2 font-medium text-white">-</span></div>
        <div><span class="text-slate-400">邮箱</span> <span id="email" class="ml-2 font-medium text-white">-</span></div>
        <div class="sm:col-span-2"><span class="text-slate-400">UUID</span> <span id="uuid" class="ml-2 break-all font-mono text-xs text-slate-200">-</span></div>
      </div>
      <div class="mt-5 flex flex-wrap items-center gap-3">
        <label class="text-sm text-slate-400">节点</label>
        <select id="node-select" class="min-w-[200px] flex-1 rounded-xl border border-white/10 bg-slate-950/50 px-3 py-2 text-sm outline-none focus:border-indigo-400/50"></select>
        <button type="button" onclick="switchNode()" class="rounded-xl bg-indigo-500/90 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-500">切换节点</button>
      </div>
    </section>

    <section class="rounded-[1.5rem] border border-indigo-500/25 bg-indigo-500/5 p-5 sm:p-6">
      <div class="flex flex-wrap items-end justify-between gap-2">
        <h2 class="text-lg font-bold text-white">X-UI 实时用量</h2>
        <span id="xui-sync-hint" class="text-xs text-slate-500">同步中…</span>
      </div>
      <p class="mt-1 text-sm text-slate-400">

      </p>
      <div id="xui-unavailable" class="mt-4 hidden rounded-2xl border border-white/10 bg-slate-950/30 p-4 text-sm text-slate-400"></div>
      <div id="xui-content" class="mt-4 hidden grid gap-3 text-sm sm:grid-cols-2 lg:grid-cols-3">
        <div class="rounded-2xl border border-white/10 bg-slate-950/30 p-4">
          <div class="text-xs text-slate-400">
            到期时间 <span class="text-[11px] text-slate-500">(北京时间)</span>
          </div>
          <div id="xui-expiry" class="mt-1 font-semibold text-white">—</div>
        </div>
        <div class="rounded-2xl border border-white/10 bg-slate-950/30 p-4">
          <div class="text-xs text-slate-400">流量总限额</div>
          <div id="xui-total" class="mt-1 font-semibold text-white">—</div>
        </div>
        <div class="rounded-2xl border border-white/10 bg-slate-950/30 p-4">
          <div class="text-xs text-slate-400">剩余流量</div>
          <div id="xui-remaining" class="mt-1 font-semibold text-white">—</div>
        </div>
      </div>
    </section>

    <section class="rounded-[1.5rem] border border-white/10 bg-white/5 p-5 sm:p-6">
      <div class="flex flex-wrap items-center justify-between gap-3">
        <h2 class="text-lg font-bold text-white">套餐信息</h2>
        <div class="flex flex-wrap gap-2">
          <button
            id="tab-upgrade-btn"
            type="button"
            onclick="setRechargeUpgradeTab('upgrade')"
            class="rounded-xl bg-indigo-500/90 px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-indigo-500/20 transition hover:bg-indigo-500"
          >
            选择套餐
          </button>
          <button
            id="tab-recharge-btn"
            type="button"
            onclick="setRechargeUpgradeTab('recharge')"
            class="rounded-xl border border-white/10 bg-white/5 px-4 py-2 text-sm font-semibold text-slate-200 shadow-sm transition hover:bg-white/10"
          >
            续费套餐
          </button>
        </div>
      </div>

      <div class="mt-4">
        <!-- Upgrade -->
        <div
          id="panel-upgrade"
          class="transition-all duration-200 ease-out overflow-hidden max-h-[900px] opacity-100 translate-y-0 pointer-events-auto"
        >
          <div class="grid gap-3 sm:grid-cols-3">
            <div class="upgrade-card rounded-[1.25rem] border border-white/10 bg-slate-950/20 p-5 transition-all hover:-translate-y-0.5 hover:shadow-lg hover:shadow-indigo-500/10">
              <div id="upgrade-basic-name" class="text-sm font-semibold text-slate-200">Basic</div>
              <div id="upgrade-basic-traffic" class="mt-1 text-xs text-slate-400">—</div>
              <div id="upgrade-basic-price" class="mt-3 text-2xl font-extrabold text-white">$—</div>
              <button
                id="upgrade-btn-basic"
                type="button"
                data-plan-id=""
                onclick="onUpgradeClick(this)"
                class="mt-4 w-full rounded-2xl bg-indigo-500/90 py-2.5 text-sm font-semibold text-white shadow-lg shadow-indigo-500/20 transition hover:bg-indigo-500"
              >
                选择 Basic 套餐
              </button>
            </div>

            <div class="upgrade-card rounded-[1.25rem] border border-white/10 bg-slate-950/20 p-5 transition-all hover:-translate-y-0.5 hover:shadow-lg hover:shadow-indigo-500/10">
              <div id="upgrade-pro-name" class="text-sm font-semibold text-slate-200">Pro</div>
              <div id="upgrade-pro-traffic" class="mt-1 text-xs text-slate-400">—</div>
              <div id="upgrade-pro-price" class="mt-3 text-2xl font-extrabold text-white">$—</div>
              <button
                id="upgrade-btn-pro"
                type="button"
                data-plan-id=""
                onclick="onUpgradeClick(this)"
                class="mt-4 w-full rounded-2xl bg-indigo-500/90 py-2.5 text-sm font-semibold text-white shadow-lg shadow-indigo-500/20 transition hover:bg-indigo-500"
              >
                选择 Pro 套餐
              </button>
            </div>

            <div class="upgrade-card rounded-[1.25rem] border border-white/10 bg-slate-950/20 p-5 transition-all hover:-translate-y-0.5 hover:shadow-lg hover:shadow-indigo-500/10">
              <div id="upgrade-premium-name" class="text-sm font-semibold text-slate-200">Premium</div>
              <div id="upgrade-premium-traffic" class="mt-1 text-xs text-slate-400">—</div>
              <div id="upgrade-premium-price" class="mt-3 text-2xl font-extrabold text-white">$—</div>
              <button
                id="upgrade-btn-premium"
                type="button"
                data-plan-id=""
                onclick="onUpgradeClick(this)"
                class="mt-4 w-full rounded-2xl bg-indigo-500/90 py-2.5 text-sm font-semibold text-white shadow-lg shadow-indigo-500/20 transition hover:bg-indigo-500"
              >
                选择 Premium 套餐
              </button>
            </div>
          </div>
          <p class="mt-3 text-xs text-slate-400">升级后覆盖当前套餐：重置流量并更新到期时间。</p>
        </div>

        <!-- Recharge -->
        <div
          id="panel-recharge"
          class="transition-all duration-200 ease-out overflow-hidden max-h-0 opacity-0 translate-y-2 pointer-events-none"
        >
          <div class="grid gap-3 sm:grid-cols-3">
            <div class="recharge-card rounded-[1.25rem] border border-white/10 bg-slate-950/20 p-5 transition-all hover:-translate-y-0.5 hover:shadow-lg hover:shadow-indigo-500/10">
              <div class="text-sm font-semibold text-slate-200">+100GB</div>
              <div id="recharge-price-100" class="mt-2 text-2xl font-extrabold text-white">$—</div>
              <button
                id="recharge-btn-100"
                type="button"
                data-traffic-gb="100"
                onclick="onRechargeClick(this)"
                class="mt-4 w-full rounded-2xl bg-indigo-500/90 py-2.5 text-sm font-semibold text-white shadow-lg shadow-indigo-500/20 transition hover:bg-indigo-500"
              >
                购买
              </button>
            </div>

            <div class="recharge-card rounded-[1.25rem] border border-white/10 bg-slate-950/20 p-5 transition-all hover:-translate-y-0.5 hover:shadow-lg hover:shadow-indigo-500/10">
              <div class="text-sm font-semibold text-slate-200">+200GB</div>
              <div id="recharge-price-200" class="mt-2 text-2xl font-extrabold text-white">$—</div>
              <button
                id="recharge-btn-200"
                type="button"
                data-traffic-gb="200"
                onclick="onRechargeClick(this)"
                class="mt-4 w-full rounded-2xl bg-indigo-500/90 py-2.5 text-sm font-semibold text-white shadow-lg shadow-indigo-500/20 transition hover:bg-indigo-500"
              >
                购买
              </button>
            </div>

            <div class="recharge-card rounded-[1.25rem] border border-white/10 bg-slate-950/20 p-5 transition-all hover:-translate-y-0.5 hover:shadow-lg hover:shadow-indigo-500/10">
              <div class="text-sm font-semibold text-slate-200">+500GB</div>
              <div id="recharge-price-500" class="mt-2 text-2xl font-extrabold text-white">$—</div>
              <button
                id="recharge-btn-500"
                type="button"
                data-traffic-gb="500"
                onclick="onRechargeClick(this)"
                class="mt-4 w-full rounded-2xl bg-indigo-500/90 py-2.5 text-sm font-semibold text-white shadow-lg shadow-indigo-500/20 transition hover:bg-indigo-500"
              >
                购买
              </button>
            </div>
          </div>
          <p class="mt-3 text-xs text-slate-400">购买后叠加当前剩余流量；到期时间不改变。</p>
        </div>
      </div>
    </section>

    <section class="rounded-[1.5rem] border border-indigo-500/20 bg-indigo-500/5 p-5 sm:p-6">
      <h2 class="text-lg font-bold text-white">订阅链接 (VLESS)</h2>
      <div id="vless-link" class="mt-3 break-all rounded-xl border border-white/10 bg-slate-950/40 p-4 font-mono text-xs text-slate-200">加载中…</div>
      <div class="mt-4 flex flex-wrap gap-2">
        <button type="button" onclick="copyLink()" class="rounded-xl bg-gradient-to-r from-indigo-500 to-fuchsia-500 px-4 py-2 text-sm font-semibold text-white shadow-lg shadow-indigo-500/20 hover:opacity-95">复制链接</button>
      </div>
    </section>
  </main>

  <script>
(function () {
  const token = localStorage.getItem("token");
  if (!token) {
    window.location.href = "{{ (site_url('index') | trim) }}";
    throw new Error("no token");
  }

  // 当前套餐对应的总流量上限（GB），由 /api/plans/xui-status 的 total_bytes 推断
  let currentPlanLimitGb = null;
  let bannerTimer = null;

  function apiPath(path) {
    const meta = document.querySelector('meta[name="api-base"]');
    let base = meta && meta.getAttribute("content") ? meta.getAttribute("content").trim() : "";
    if (!base) return path;
    return base.replace(/\/?$/, "") + (path.startsWith("/") ? path : "/" + path);
  }

  function authHeaders(json) {
    const h = { Authorization: "Bearer " + token };
    if (json) h["Content-Type"] = "application/json";
    return h;
  }

  function formatBeijingFromMs(ms) {
    const n = Number(ms);
    if (!n || n <= 0) return "不限";
    const dt = new Date(n);
    if (Number.isNaN(dt.getTime())) return "—";
    // 明确指定时区：面向中国客户显示北京时间
    return new Intl.DateTimeFormat("zh-CN", {
      timeZone: "Asia/Shanghai",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
    })
      .format(dt)
      .replace(/\//g, "-");
  }

  function formatBeijingFromIso(iso) {
    if (!iso) return "—";
    const dt = new Date(iso);
    if (Number.isNaN(dt.getTime())) return "—";
    return new Intl.DateTimeFormat("zh-CN", {
      timeZone: "Asia/Shanghai",
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
    })
      .format(dt)
      .replace(/\//g, "-");
  }

  function showBanner(kind, msg) {
    const el = document.getElementById("banner");
    el.classList.remove("hidden", "border-red-500/40", "bg-red-500/10", "text-red-200", "border-emerald-500/40", "bg-emerald-500/10", "text-emerald-100");
    if (kind === "ok") el.classList.add("border-emerald-500/40", "bg-emerald-500/10", "text-emerald-100");
    else el.classList.add("border-red-500/40", "bg-red-500/10", "text-red-200");
    el.textContent = msg;
    el.classList.remove("hidden");
    if (bannerTimer) {
      clearTimeout(bannerTimer);
      bannerTimer = null;
    }
    bannerTimer = setTimeout(function () {
      hideBanner();
    }, 5000);
  }

  function hideBanner() {
    document.getElementById("banner").classList.add("hidden");
  }

  async function loadXuiStatus() {
    const hint = document.getElementById("xui-sync-hint");
    const unav = document.getElementById("xui-unavailable");
    const content = document.getElementById("xui-content");
    if (hint) hint.textContent = "同步中…";
    let resp;
    try {
      resp = await fetch(apiPath("/api/plans/xui-status"), { headers: authHeaders(false) });
    } catch (e) {
      if (unav) {
        unav.classList.remove("hidden");
        unav.textContent = "网络异常，无法拉取 X-UI 数据。";
      }
      if (content) content.classList.add("hidden");
      if (hint) hint.textContent = "";
      return;
    }
    let body;
    try {
      body = await resp.json();
    } catch (e) {
      body = null;
    }
    if (!resp.ok) {
      if (unav) {
        unav.classList.remove("hidden");
        const m = body && (body.message || (body.data && body.data.message));
        const hi = body && body.hint ? " · " + body.hint : "";
        unav.textContent = "请求失败 HTTP " + resp.status + (m ? " · " + m : "") + hi;
      }
      if (content) content.classList.add("hidden");
      if (hint) hint.textContent = "";
      return;
    }
    const d = body && body.data;
    if (!body || !d) {
      if (unav) {
        unav.classList.remove("hidden");
        unav.textContent = "接口返回无效";
      }
      if (content) content.classList.add("hidden");
      if (hint) hint.textContent = "";
      return;
    }

    function fillFromLocal(fb) {
      var expEl = document.getElementById("xui-expiry");
      var totEl = document.getElementById("xui-total");
      var remEl = document.getElementById("xui-remaining");
      if (expEl)
        expEl.textContent = formatBeijingFromIso(fb.expires_at_iso);
      if (totEl) totEl.textContent = fb.traffic_limit_gb != null ? fb.traffic_limit_gb + " GB（订单）" : "—";
      if (remEl)
        remEl.textContent =
          fb.traffic_remaining_gb != null ? Number(fb.traffic_remaining_gb).toFixed(2) + " GB（订单）" : "—";
    }

    if (!d.available && d.local_fallback) {
      if (unav) {
        unav.classList.remove("hidden");
        unav.textContent =
          (d.message || "面板数据暂不可用") +
          "（下方为系统内最近一次订单记录，可能与面板不一致）";
      }
      if (content) content.classList.remove("hidden");
      if (hint) hint.textContent = "本地参考";
      fillFromLocal(d.local_fallback);
      // 面板不可用时不尝试推断当前套餐（避免误差）
      currentPlanLimitGb = null;
      return;
    }

    if (!d.available) {
      if (unav) {
        unav.classList.remove("hidden");
        unav.textContent = (d && d.message) || "无数据";
      }
      if (content) content.classList.add("hidden");
      if (hint) hint.textContent = "";
      return;
    }

    if (unav) unav.classList.add("hidden");
    if (content) content.classList.remove("hidden");
    if (hint) hint.textContent = "已同步 " + new Date().toLocaleTimeString();
    var expEl = document.getElementById("xui-expiry");
    var totEl = document.getElementById("xui-total");
    var remEl = document.getElementById("xui-remaining");
    // 新注册但尚未开通套餐的用户：total_bytes=0 且 used_bytes=0。
    // 对这类用户，UI 不应显示为「不限」，而是清晰地展示为 0。
    var looksNewUser = (!d.total_bytes || d.total_bytes <= 0) && (!d.used_bytes || d.used_bytes <= 0);
    if (expEl) {
      if (looksNewUser) {
        expEl.textContent = "—";
      } else {
        expEl.textContent = d.unlimited_expiry ? "不限" : formatBeijingFromMs(d.expiry_time_ms);
      }
    }
    if (totEl) {
      if (looksNewUser) {
        totEl.textContent = "0 B";
      } else {
        totEl.textContent = d.unlimited_traffic ? "不限" : (d.total_display || "—");
      }
    }
    if (remEl) {
      if (looksNewUser) {
        remEl.textContent = "0 B";
      } else {
        remEl.textContent = d.remaining_display != null ? d.remaining_display : "—";
      }
    }

    // 只有在 total>0 且不是“新用户未开通”时才推断当前套餐的流量档位
    if (!looksNewUser && d.total_bytes && d.total_bytes > 0) {
      const gib = d.total_bytes / (1024 * 1024 * 1024);
      currentPlanLimitGb = Number(gib.toFixed(2));
    } else {
      currentPlanLimitGb = null;
    }

    // 每次成功拉取 X-UI 状态后，根据最新的 total_bytes 重新高亮当前套餐
    await initRechargeUpgradeCards();
  }

  function formatMoneyUSD(n) {
    const x = Number(n);
    if (Number.isNaN(x)) return "$—";
    return "$" + x.toFixed(2);
  }

  function formatTrafficMonthly(gb) {
    const x = Number(gb);
    if (!x || Number.isNaN(x)) return "—";
    if (x >= 1000) return (x / 1000).toFixed(2).replace(/\\.00$/, "") + "TB/月";
    return x.toFixed(x % 1 === 0 ? 0 : 2).replace(/\\.00$/, "") + "GB/月";
  }

  function sleep(ms) {
    return new Promise((resolve) => setTimeout(resolve, ms));
  }

  function markSelectedCard(groupClass, btn) {
    var cards = document.querySelectorAll("." + groupClass);
    cards.forEach(function (card) {
      card.classList.remove("ring-2", "ring-indigo-400/70", "opacity-80");
    });
    if (!btn) return;
    var card = btn.closest("." + groupClass);
    if (!card) return;
    card.classList.add("ring-2", "ring-indigo-400/70", "opacity-80");
  }

  window.setRechargeUpgradeTab = function (tab) {
    const panelRecharge = document.getElementById("panel-recharge");
    const panelUpgrade = document.getElementById("panel-upgrade");
    const tabRechargeBtn = document.getElementById("tab-recharge-btn");
    const tabUpgradeBtn = document.getElementById("tab-upgrade-btn");
    if (!panelRecharge || !panelUpgrade || !tabRechargeBtn || !tabUpgradeBtn) return;

    const isRecharge = tab === "recharge";
    // Panel animation: opacity + translate + max-height
    if (isRecharge) {
      panelRecharge.classList.remove("max-h-0", "opacity-0", "translate-y-2", "pointer-events-none");
      panelRecharge.classList.add("max-h-[900px]", "opacity-100", "translate-y-0", "pointer-events-auto");
      panelUpgrade.classList.remove("max-h-[900px]", "opacity-100", "translate-y-0", "pointer-events-auto");
      panelUpgrade.classList.add("max-h-0", "opacity-0", "translate-y-2", "pointer-events-none");
      tabRechargeBtn.classList.add("bg-indigo-500/90", "text-white", "shadow-lg");
      tabRechargeBtn.classList.remove("border", "border-white/10", "bg-white/5", "text-slate-200", "shadow-sm");
      tabUpgradeBtn.classList.add("border", "border-white/10", "bg-white/5", "text-slate-200", "shadow-sm");
      tabUpgradeBtn.classList.remove("bg-indigo-500/90", "text-white", "shadow-lg");
    } else {
      panelUpgrade.classList.remove("max-h-0", "opacity-0", "translate-y-2", "pointer-events-none");
      panelUpgrade.classList.add("max-h-[900px]", "opacity-100", "translate-y-0", "pointer-events-auto");
      panelRecharge.classList.remove("max-h-[900px]", "opacity-100", "translate-y-0", "pointer-events-auto");
      panelRecharge.classList.add("max-h-0", "opacity-0", "translate-y-2", "pointer-events-none");
      tabUpgradeBtn.classList.add("bg-indigo-500/90", "text-white", "shadow-lg");
      tabUpgradeBtn.classList.remove("border", "border-white/10", "bg-white/5", "text-slate-200", "shadow-sm");
      tabRechargeBtn.classList.add("border", "border-white/10", "bg-white/5", "text-slate-200", "shadow-sm");
      tabRechargeBtn.classList.remove("bg-indigo-500/90", "text-white", "shadow-lg");
    }
  };

  async function initRechargeUpgradeCards() {
    try {
      const resp = await fetch(apiPath("/api/plans"));
      const body = await resp.json();
      const plans = (body.data && body.data.plans) || [];
      // 三个套餐始终展示：即使 /api/plans 未返回某个套餐，也用默认值兜底显示
      const basic = plans.find((p) => p.name === "Basic") || {
        id: 1,
        name: "Basic",
        price: 9.99,
        traffic_limit_gb: 100,
      };
      const pro = plans.find((p) => p.name === "Pro") || {
        id: 2,
        name: "Pro",
        price: 19.99,
        traffic_limit_gb: 300,
      };
      const premium = plans.find((p) => p.name === "Premium") || {
        id: 3,
        name: "Premium",
        price: 39.99,
        traffic_limit_gb: 1000,
      };

      // Recharge pricing: proportional to Pro (price / traffic_limit_gb)
      const proPricePerGb = pro && pro.traffic_limit_gb ? Number(pro.price) / Number(pro.traffic_limit_gb) : 0;
      const rechargeOptions = [100, 200, 500];
      rechargeOptions.forEach((gb) => {
        const el = document.getElementById("recharge-price-" + gb);
        if (!el) return;
        const price = proPricePerGb > 0 ? proPricePerGb * gb : NaN;
        el.textContent = formatMoneyUSD(price);
      });

      // Upgrade cards
      const basicTraffic = document.getElementById("upgrade-basic-traffic");
      const basicPrice = document.getElementById("upgrade-basic-price");
      const basicBtn = document.getElementById("upgrade-btn-basic");
      if (basicTraffic && basicPrice && basicBtn) {
        basicTraffic.textContent = formatTrafficMonthly(basic.traffic_limit_gb);
        basicPrice.textContent = formatMoneyUSD(basic.price);
        basicBtn.setAttribute("data-plan-id", String(basic.id || 1));
      }

      const proTraffic = document.getElementById("upgrade-pro-traffic");
      const proPrice = document.getElementById("upgrade-pro-price");
      const proBtn = document.getElementById("upgrade-btn-pro");
      if (proTraffic && proPrice && proBtn) {
        proTraffic.textContent = formatTrafficMonthly(pro.traffic_limit_gb);
        proPrice.textContent = formatMoneyUSD(pro.price);
        proBtn.setAttribute("data-plan-id", String(pro.id || 2));
      }

      const premiumTraffic = document.getElementById("upgrade-premium-traffic");
      const premiumPrice = document.getElementById("upgrade-premium-price");
      const premiumBtn = document.getElementById("upgrade-btn-premium");
      if (premiumTraffic && premiumPrice && premiumBtn) {
        premiumTraffic.textContent = formatTrafficMonthly(premium.traffic_limit_gb);
        premiumPrice.textContent = formatMoneyUSD(premium.price);
        premiumBtn.setAttribute("data-plan-id", String(premium.id || 3));
      }

      // 根据当前 X-UI 面板上的总流量（GB）高亮当前套餐，并标记“当前套餐”标签 + 禁用按钮
      const curGb = currentPlanLimitGb;
      function applyCurrentPlanByLimit(planObj, btn, label) {
        if (!btn || !planObj || !planObj.traffic_limit_gb || !curGb) {
          if (btn) {
            btn.disabled = false;
            btn.classList.remove("opacity-70", "cursor-default");
            if (label) btn.textContent = label;
          }
          return;
        }
        const planGb = Number(planObj.traffic_limit_gb);
        const match = Math.abs(planGb - curGb) < 0.01;
        if (match) {
          // 按钮禁用 + 文案
          btn.disabled = true;
          btn.textContent = "当前套餐";
          btn.classList.add("opacity-70", "cursor-default");
        } else {
          btn.disabled = false;
          btn.classList.remove("opacity-70", "cursor-default");
          btn.textContent = label;
        }
      }

      applyCurrentPlanByLimit(
        basic,
        basicBtn,
        "选择 Basic 套餐"
      );
      applyCurrentPlanByLimit(
        pro,
        proBtn,
        "选择 Pro 套餐"
      );
      applyCurrentPlanByLimit(
        premium,
        premiumBtn,
        "选择 Premium 套餐"
      );
    } catch (e) {
      // silent
    }
  }

  window.onRechargeClick = async function (btn) {
    if (!btn) return;
    if (btn.disabled) return;
    const trafficGb = Number(btn.getAttribute("data-traffic-gb"));
    if (!trafficGb || Number.isNaN(trafficGb)) return;



    const old = btn.textContent;
    btn.disabled = true;
    btn.textContent = "处理中…";
    btn.classList.add("opacity-70", "cursor-not-allowed");

    try {
      const resp = await fetch(apiPath("/api/plans/recharge"), {
        method: "POST",
        headers: authHeaders(true),
        body: JSON.stringify({ traffic_gb: trafficGb }),
      });
      const body = await resp.json().catch(() => null);
      if (!resp.ok || !body || !body.success) {
        showBanner("err", (body && body.message) || "充值失败");
        return;
      }
      showBanner("ok", (body && body.message) || "充值成功");
      if (body.data && body.data.subscription_url && document.getElementById("vless-link")) {
        document.getElementById("vless-link").textContent = body.data.subscription_url;
      }
      // 面板更新可能需要一点时间，稍等再刷新实时用量，保证“看起来实时”
      await sleep(800);
      await loadXuiStatus();
    } catch (e) {
      showBanner("err", "网络异常，充值失败");
    } finally {
      btn.disabled = false;
      btn.textContent = old;
      btn.classList.remove("opacity-70", "cursor-not-allowed");
    }
  };

  window.onUpgradeClick = async function (btn) {
    if (!btn) return;
    if (btn.disabled) return;
    const planId = btn.getAttribute("data-plan-id");
    const pid = Number(planId);
    if (!pid || Number.isNaN(pid)) {
      showBanner("err", "未加载到可升级套餐信息，请刷新页面后重试。");
      return;
    }


    const old = btn.textContent;
    let upgradeSucceeded = false;
    btn.disabled = true;
    btn.textContent = "处理中…";
    btn.classList.add("opacity-70", "cursor-not-allowed");

    try {
      const resp = await fetch(apiPath("/api/plans/upgrade"), {
        method: "POST",
        headers: authHeaders(true),
        body: JSON.stringify({ plan_id: pid }),
      });
      const body = await resp.json().catch(() => null);
      if (!resp.ok || !body || !body.success) {
        showBanner("err", (body && body.message) || "升级失败");
        return;
      }
      showBanner("ok", (body && body.message) || "升级成功");
      if (body.data && body.data.subscription_url && document.getElementById("vless-link")) {
        document.getElementById("vless-link").textContent = body.data.subscription_url;
      }
      // 先乐观更新当前套餐状态，避免必须手动刷新才能看到“当前套餐”
      const selectedCard = btn.closest(".upgrade-card");
      const trafficEl = selectedCard ? selectedCard.querySelector('[id$="-traffic"]') : null;
      if (trafficEl && trafficEl.textContent) {
        const txt = String(trafficEl.textContent).trim().toUpperCase();
        if (txt.includes("TB")) {
          const n = Number(txt.replace(/[^0-9.]/g, ""));
          if (!Number.isNaN(n) && n > 0) currentPlanLimitGb = Number((n * 1000).toFixed(2));
        } else if (txt.includes("GB")) {
          const n = Number(txt.replace(/[^0-9.]/g, ""));
          if (!Number.isNaN(n) && n > 0) currentPlanLimitGb = Number(n.toFixed(2));
        }
      }
      upgradeSucceeded = true;
      await initRechargeUpgradeCards();
      await sleep(800);
      await loadXuiStatus();
    } catch (e) {
      showBanner("err", "网络异常，升级失败");
    } finally {
      if (!upgradeSucceeded) {
        btn.disabled = false;
        btn.textContent = old;
      }
      btn.classList.remove("cursor-not-allowed");
    }
  };

  async function loadProfile() {
    const resp = await fetch(apiPath("/api/auth/me"), { headers: authHeaders(false) });
    if (!resp.ok) {
      localStorage.removeItem("token");
      window.location.href = "{{ (site_url('index') | trim) }}";
      return;
    }
    const data = await resp.json();
    const user = data.data.user;
    document.getElementById("username").textContent = user.username;
    document.getElementById("email").textContent = user.email;
    document.getElementById("uuid").textContent = user.uuid;
    document.getElementById("vless-link").textContent = user.vless_link || "—";
    await loadNodes(user.current_node_id);
  }

  async function loadNodes(currentNodeId) {
    const resp = await fetch(apiPath("/api/nodes"), { headers: authHeaders(false) });
    if (!resp.ok) return;
    const data = await resp.json();
    const nodes = (data.data && data.data.nodes) || [];
    const select = document.getElementById("node-select");
    select.innerHTML = "";
    nodes.forEach((n) => {
      const opt = document.createElement("option");
      opt.value = n.id;
      opt.textContent = n.name + " (" + n.region + ")";
      if (n.id === currentNodeId) opt.selected = true;
      select.appendChild(opt);
    });
  }

  window.switchNode = async function () {
    hideBanner();
    const nodeId = Number(document.getElementById("node-select").value);
    if (!nodeId) return;
    const resp = await fetch(apiPath("/api/nodes/select"), {
      method: "POST",
      headers: authHeaders(true),
      body: JSON.stringify({ node_id: nodeId }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      showBanner("err", data.message || "切换失败");
      return;
    }
    document.getElementById("uuid").textContent = data.data.uuid;
    document.getElementById("vless-link").textContent = data.data.vless_link || "—";
    showBanner("ok", "已切换节点");
    await loadXuiStatus();
  };

  window.copyLink = async function () {
    const text = document.getElementById("vless-link").textContent;
    await navigator.clipboard.writeText(text);
    showBanner("ok", "已复制");
  };

  window.logout = function () {
    localStorage.removeItem("token");
    window.location.href = "{{ (site_url('index') | trim) }}";
  };

  loadProfile().then(function () {
    loadXuiStatus();
  });
  setInterval(loadXuiStatus, 30000);
})();
  </script>
</body>
</html>
