{% from '_site_urls.html' import site_url %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="api-base" content="{{ request.script_root or '' }}" />
  <title>订单中心 · 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["ui-sans-serif", "system-ui", "Segoe UI", "Roboto", "PingFang SC", "Microsoft YaHei", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    .admin-shell { background: linear-gradient(180deg, #0c1222 0%, #0a0e1a 40%, #080b14 100%); }
    .admin-card { box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.03) inset; }
  </style>
  <script src="{{ url_for('static', filename='js/admin_api.js') }}"></script>
</head>
<body class="admin-shell min-h-screen text-slate-100 antialiased">
  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -left-20 top-0 h-[320px] w-[480px] rounded-full bg-indigo-600/12 blur-3xl"></div>
    <div class="absolute -right-20 top-40 h-[280px] w-[420px] rounded-full bg-violet-600/10 blur-3xl"></div>
  </div>

  <header class="border-b border-white/[0.06] bg-slate-950/40 backdrop-blur-md">
    <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-4 px-4 py-4">
      <div class="flex items-center gap-3">
        <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-indigo-500 to-violet-600 text-sm font-bold text-white shadow-lg shadow-indigo-500/25">订</div>
        <div>
          <div class="text-lg font-semibold tracking-tight text-white">订单中心</div>
          <div class="text-xs text-slate-500">支付审核 · 开通同步</div>
        </div>
      </div>
      <nav class="flex flex-wrap items-center gap-3 text-sm">
        <a href="{{ site_url('index') }}" class="rounded-lg px-3 py-1.5 text-slate-400 transition hover:bg-white/5 hover:text-white">返回站点</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">

    {% include 'partials/admin_orders/token_section.html' %}
    {% include 'partials/admin_orders/orders_panel.html' %}
  </main>

  <script>
    (function () {
      var meta = document.querySelector('meta[name="api-base"]');
      var root = meta && meta.getAttribute("content") ? meta.getAttribute("content").trim() : "";
      var el = document.getElementById("admin-backend-origin");
      if (el) el.textContent = window.location.origin + (root ? root.replace(/\/?$/, "") : "");
    })();
  </script>
  <script src="{{ url_for('static', filename='js/admin_orders.js') }}"></script>
</body>
</html>
